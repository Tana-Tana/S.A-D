events {
    worker_connections 1024;
}

http {
    # Docker internal DNS resolver — bắt buộc để resolve container hostnames
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ─── Rate Limiting ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

    server {
        listen 80;
        server_name localhost;

        # ─── CORS (cho phép cross-origin từ port 3000) ───────────────────
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

        # Xử lý OPTIONS preflight — trả về 204 ngay
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ─── Logging ─────────────────────────────────────────────────────
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log warn;

        # ─── Auth endpoints ───────────────────────────────────────────────
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            set $user_svc http://user-service:8000;
            proxy_pass $user_svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ─── User Service ─────────────────────────────────────────────────
        location /users/ {
            set $user_svc http://user-service:8000;
            proxy_pass $user_svc;
            proxy_set_header Host $host;
        }

        # ─── Product Service ──────────────────────────────────────────────
        location /products/ {
            set $product_svc http://product-service:8001;
            proxy_pass $product_svc;
            proxy_set_header Host $host;
        }

        location /categories/ {
            set $product_svc http://product-service:8001;
            proxy_pass $product_svc;
            proxy_set_header Host $host;
        }

        location /events/ {
            set $product_svc http://product-service:8001;
            proxy_pass $product_svc;
            proxy_set_header Host $host;
        }

        # ─── Cart Service ─────────────────────────────────────────────────
        location /cart/ {
            set $cart_svc http://cart-service:8002;
            proxy_pass $cart_svc;
            proxy_set_header Host $host;
        }

        # ─── Order Service ────────────────────────────────────────────────
        location /orders/ {
            set $order_svc http://order-service:8003;
            proxy_pass $order_svc;
            proxy_set_header Host $host;
        }

        # ─── Payment Service ──────────────────────────────────────────────
        location /payment/ {
            set $payment_svc http://payment-service:8004;
            proxy_pass $payment_svc;
            proxy_set_header Host $host;
        }

        # ─── Shipping Service ─────────────────────────────────────────────
        location /shipping/ {
            set $shipping_svc http://shipping-service:8005;
            proxy_pass $shipping_svc;
            proxy_set_header Host $host;
        }

        # ─── AI Service ───────────────────────────────────────────────────
        location /recommend {
            set $ai_svc http://ai-service:8006;
            proxy_pass $ai_svc;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
        }

        location /chatbot {
            set $ai_svc http://ai-service:8006;
            proxy_pass $ai_svc;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
        }

        location /health {
            set $ai_svc http://ai-service:8006;
            proxy_pass $ai_svc;
        }

        # ─── Gateway health ───────────────────────────────────────────────
        location /gateway/health {
            default_type application/json;
            return 200 '{"status":"ok","gateway":"nginx"}';
        }

        # ─── Frontend (catch-all) ─────────────────────────────────────────
        location / {
            set $frontend http://frontend:3000;
            proxy_pass $frontend;
            proxy_set_header Host $host;
        }
    }
}
