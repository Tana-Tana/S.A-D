version: '3.9'

# ═══════════════════════════════════════════════════════════════
# E-Commerce Microservices — Docker Compose
# Hệ thống gồm: 7 services Django/FastAPI + 3 DB + 1 Gateway
# ═══════════════════════════════════════════════════════════════

networks:
  ecom-network:
    driver: bridge

volumes:
  user-db-data:
  product-db-data:
  cart-db-data:
  order-db-data:
  payment-db-data:
  shipping-db-data:
  redis-data:
  neo4j-data:

services:

  # ─────────────────────────────────────────────────────────────
  # DATABASES
  # ─────────────────────────────────────────────────────────────

  user-db:
    image: mysql:8.0
    container_name: user-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: user_db
    volumes:
      - user-db-data:/var/lib/mysql
    networks: [ecom-network]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:15
    container_name: product-db
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks: [ecom-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks: [ecom-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:15
    container_name: payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    networks: [ecom-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  shipping-db:
    image: postgres:15
    container_name: shipping-db
    environment:
      POSTGRES_DB: shipping_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - shipping-db-data:/var/lib/postgresql/data
    networks: [ecom-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  cart-db:
    image: postgres:15
    container_name: cart-db
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - cart-db-data:/var/lib/postgresql/data
    networks: [ecom-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis-data:/data
    networks: [ecom-network]

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '[]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    networks: [ecom-network]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────────────────────

  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8000:8000"
    environment:
      DB_HOST: user-db
      DB_NAME: user_db
      DB_USER: root
      DB_PASSWORD: password
      DB_PORT: "3306"
    depends_on:
      user-db:
        condition: service_healthy
    networks: [ecom-network]
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_users &&
             python manage.py runserver 0.0.0.0:8000"

  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8001:8001"
    volumes:
      - ../product-service/data:/app/data
    environment:
      DB_HOST: product-db
      DB_NAME: product_db
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: "5432"
    depends_on:
      product-db:
        condition: service_healthy
    networks: [ecom-network]
    command: >
      sh -c "python manage.py makemigrations products &&
             python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8001"

  cart-service:
    build:
      context: ../cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    ports:
      - "8002:8002"
    environment:
      DB_HOST: cart-db
      DB_NAME: cart_db
      DB_USER: postgres
      DB_PASSWORD: password
      PRODUCT_SERVICE_URL: http://product-service:8001
    networks: [ecom-network]
    depends_on:
      cart-db:
        condition: service_healthy
      product-service:
        condition: service_started

  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8003:8003"
    environment:
      DB_HOST: order-db
      DB_NAME: order_db
      DB_USER: postgres
      DB_PASSWORD: password
      CART_SERVICE_URL: http://cart-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8004
    networks: [ecom-network]
    depends_on:
      order-db:
        condition: service_healthy
      cart-service:
        condition: service_started

  payment-service:
    build:
      context: ../payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8004:8004"
    environment:
      DB_HOST: payment-db
      DB_NAME: payment_db
      DB_USER: postgres
      DB_PASSWORD: password
      ORDER_SERVICE_URL: http://order-service:8003
      SHIPPING_SERVICE_URL: http://shipping-service:8005
    networks: [ecom-network]
    depends_on:
      payment-db:
        condition: service_healthy
      order-service:
        condition: service_started

  shipping-service:
    build:
      context: ../shipping-service
      dockerfile: Dockerfile
    container_name: shipping-service
    ports:
      - "8005:8005"
    environment:
      DB_HOST: shipping-db
      DB_NAME: shipping_db
      DB_USER: postgres
      DB_PASSWORD: password
      ORDER_SERVICE_URL: http://order-service:8003
    networks: [ecom-network]
    depends_on:
      shipping-db:
        condition: service_healthy

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "8006:8006"
    volumes:
      - ../product-service/data:/app/live_data:ro
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
    networks: [ecom-network]
    depends_on:
      - product-service
      - neo4j

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    networks: [ecom-network]

  # ─────────────────────────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────────────────────────

  gateway:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - ai-service
    networks: [ecom-network]
