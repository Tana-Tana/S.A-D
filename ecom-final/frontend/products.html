<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sản phẩm — EcomAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .filter-sidebar {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-100);
      position: sticky;
      top: 90px;
    }
    .filter-title { font-weight: 700; font-size: .9rem; color: var(--gray-800); margin-bottom: .75rem; }
    .filter-option { display: flex; align-items: center; gap: .5rem; padding: .3rem 0; cursor: pointer; font-size: .875rem; color: var(--gray-600); }
    .filter-option:hover { color: var(--primary); }
    .filter-option input { accent-color: var(--primary); }
    .sort-select {
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      padding: .45rem .9rem;
      font-size: .875rem;
      outline: none;
      background: #fff;
      cursor: pointer;
    }
    .sort-select:focus { border-color: var(--primary); }
    .results-count { font-size: .875rem; color: var(--gray-400); }
    .price-range { display: flex; gap: .5rem; align-items: center; }
    .price-input {
      flex: 1;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      padding: .35rem .6rem;
      font-size: .8rem;
      outline: none;
    }
    .price-input:focus { border-color: var(--primary); }
    .empty-state { text-align: center; padding: 4rem 0; color: var(--gray-400); }
    .empty-state i { font-size: 4rem; margin-bottom: 1rem; opacity: .4; }
    .pagination-custom { display: flex; gap: .4rem; justify-content: center; flex-wrap: wrap; }
    .page-btn {
      width: 38px; height: 38px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: .875rem;
      font-weight: 600;
      transition: var(--transition);
      display: flex; align-items: center; justify-content: center;
      color: var(--gray-600);
    }
    .page-btn:hover, .page-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar-custom">
  <div class="container d-flex align-items-center gap-3">
    <a class="navbar-brand" href="index.html">Ecom<span>AI</span></a>
    <div class="d-none d-md-flex gap-1 ms-2">
      <a href="index.html"    class="nav-link">Trang chủ</a>
      <a href="products.html" class="nav-link active">Sản phẩm</a>
      <a href="cart.html"     class="nav-link">Giỏ hàng</a>
    </div>
    <div class="ms-auto d-flex align-items-center gap-3">
      <div class="position-relative d-none d-md-block">
        <input id="nav-search" class="search-bar" placeholder="🔍  Tìm sản phẩm..." />
      </div>
      <div id="auth-area"></div>
      <a href="cart.html" class="cart-btn">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count hidden">0</span>
      </a>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div style="background:#fff;border-bottom:1px solid var(--gray-200);padding:1rem 0">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
    <div>
      <h1 style="font-size:1.4rem;font-weight:800;margin:0">Tất cả sản phẩm</h1>
      <p class="results-count mb-0" id="results-count">Đang tải...</p>
    </div>
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <input id="search-box" class="search-bar" placeholder="🔍 Tìm trong kết quả..." style="width:220px" />
      <select id="sort-select" class="sort-select" onchange="applyFilters()">
        <option value="-created_at">Mới nhất</option>
        <option value="price">Giá tăng dần</option>
        <option value="-price">Giá giảm dần</option>
        <option value="-rating">Đánh giá cao</option>
        <option value="-sold_count">Bán chạy</option>
      </select>
    </div>
  </div>
</div>

<div class="container py-4">
  <div class="row g-4">

    <!-- SIDEBAR FILTERS -->
    <div class="col-lg-3 col-md-4 d-none d-md-block">
      <div class="filter-sidebar">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <span style="font-weight:800;font-size:1rem">Bộ lọc</span>
          <button onclick="clearFilters()" style="background:none;border:none;color:var(--gray-400);font-size:.8rem;cursor:pointer">Xóa hết</button>
        </div>

        <!-- Category filter -->
        <div class="filter-title"><i class="fas fa-th-large me-1 text-primary"></i> Danh mục</div>
        <div id="category-filters">
          <label class="filter-option"><input type="radio" name="type" value="" onchange="applyFilters()" checked> 🛍️ Tất cả</label>
          <label class="filter-option"><input type="radio" name="type" value="electronics" onchange="applyFilters()"> 💻 Điện tử</label>
          <label class="filter-option"><input type="radio" name="type" value="book" onchange="applyFilters()"> 📚 Sách</label>
          <label class="filter-option"><input type="radio" name="type" value="fashion" onchange="applyFilters()"> 👗 Thời trang</label>
          <label class="filter-option"><input type="radio" name="type" value="food" onchange="applyFilters()"> 🍜 Thực phẩm</label>
          <label class="filter-option"><input type="radio" name="type" value="sports" onchange="applyFilters()"> ⚽ Thể thao</label>
          <label class="filter-option"><input type="radio" name="type" value="beauty" onchange="applyFilters()"> 💄 Làm đẹp</label>
          <label class="filter-option"><input type="radio" name="type" value="furniture" onchange="applyFilters()"> 🛋️ Nội thất</label>
        </div>

        <hr class="my-3">
        <!-- Price filter -->
        <div class="filter-title"><i class="fas fa-tag me-1 text-primary"></i> Khoảng giá</div>
        <div class="price-range">
          <input class="price-input" id="min-price" type="number" placeholder="Từ" />
          <span style="color:var(--gray-400)">—</span>
          <input class="price-input" id="max-price" type="number" placeholder="Đến" />
        </div>
        <button onclick="applyFilters()" class="btn-primary-custom mt-2" style="padding:.5rem 1rem;font-size:.85rem;border-radius:8px">Áp dụng</button>

        <hr class="my-3">
        <!-- Rating filter -->
        <div class="filter-title"><i class="fas fa-star me-1 text-primary"></i> Đánh giá</div>
        <label class="filter-option"><input type="checkbox" id="rating-filter"> ★★★★★ Từ 4 sao trở lên</label>
      </div>
    </div>

    <!-- PRODUCT GRID -->
    <div class="col-lg-9 col-md-8">
      <div id="product-grid" class="row g-3">
        <!-- skeleton -->
        ${Array(8).fill('<div class="col-6 col-md-4"><div class="skeleton" style="height:320px;border-radius:20px"></div></div>').join('')}
      </div>
      <!-- Pagination -->
      <div class="pagination-custom mt-4" id="pagination"></div>
    </div>
  </div>
</div>

<!-- Chatbot FAB -->
<button class="chatbot-fab" onclick="toggleChatbot()"><i class="fas fa-robot" id="chatbot-icon"></i></button>
<div class="chatbot-panel hidden" id="chatbot-panel">
  <div class="chatbot-header">
    <div class="chatbot-avatar">🤖</div>
    <div><div class="chatbot-name">EcomAI Assistant</div><div class="chatbot-status">● AI tư vấn sản phẩm</div></div>
    <button class="chatbot-close" onclick="toggleChatbot()"><i class="fas fa-times"></i></button>
  </div>
  <div class="chatbot-messages" id="chatbot-messages">
    <div class="message bot">Xin chào! Bạn muốn tìm sản phẩm gì? Tôi sẽ tư vấn ngay! 😊</div>
  </div>
  <div class="chatbot-input-area">
    <input id="chatbot-input" class="chatbot-input" placeholder="Hỏi về sản phẩm..." onkeydown="if(event.key==='Enter')sendChat()" />
    <button class="chatbot-send" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="border-top:none;padding-top:0">
      <span style="opacity:.5">© 2026 EcomAI — Tiểu luận SoAD</span>
    </div>
  </div>
</footer>

<script src="js/api.js?v=4"></script>
<script src="js/products-data.js?v=4"></script>
<script>
let allProducts = [];
let currentPage = 1;
const PAGE_SIZE  = 12;

// Read URL params on load
const urlParams = new URLSearchParams(location.search);
const initType  = urlParams.get('type') || '';
const initQ     = urlParams.get('q') || '';

if (initType) {
  const radio = document.querySelector(`input[name=type][value="${initType}"]`);
  if (radio) radio.checked = true;
}
if (initQ) {
  document.getElementById('search-box').value = initQ;
  document.getElementById('nav-search').value  = initQ;
}

function buildCard(p) {
  const v   = getVisual(p.product_type);
  const img = p.image_url || getTypeImage(p.product_type, p.id);
  return `
  <div class="col-6 col-md-6 col-lg-4">
    <div class="product-card" style="cursor:pointer" onclick="API.logEvent(${p.id},'click');location.href='product-detail.html?id=${p.id}'">
      <div class="product-img-wrap" style="overflow:hidden">
        <img src="${img}" alt="${p.name}" loading="lazy"
          style="width:100%;height:220px;object-fit:cover;transition:transform .4s ease"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div style="display:none;width:100%;height:220px;background:${v.gradient};align-items:center;justify-content:center;font-size:4.5rem">${v.icon}</div>
        ${p.discount_percent > 0 ? `<span class="product-badge">-${p.discount_percent}%</span>` : '<span class="product-badge new">Mới</span>'}
        <button class="product-wishlist" onclick="event.stopPropagation()"><i class="far fa-heart"></i></button>
      </div>
      <div class="product-body">
        <div class="product-type">${v.icon} ${fmt.typeLabel(p.product_type)}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-rating">
          <span class="stars">${fmt.stars(p.rating||4)}</span>
          <span class="rating-count">(${p.sold_count||0})</span>
        </div>
        <div class="product-price-row">
          <div>
            <div class="product-price">${fmt.price(p.price)}</div>
            ${p.original_price ? `<div class="product-price-old">${fmt.price(p.original_price)}</div>` : ''}
          </div>
          <button class="btn-add-cart" onclick="event.stopPropagation();addCart(${JSON.stringify(p).replace(/"/g,'&quot;')})">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function openDetail(id) { location.href = `product-detail.html?id=${id}`; }

function renderPage(products, page) {
  const start = (page - 1) * PAGE_SIZE;
  const slice = products.slice(start, start + PAGE_SIZE);
  const grid  = document.getElementById('product-grid');
  grid.innerHTML = slice.length
    ? slice.map(buildCard).join('')
    : `<div class="col-12 empty-state"><i class="fas fa-search"></i><p>Không tìm thấy sản phẩm phù hợp.</p><button onclick="clearFilters()" class="btn-primary-custom" style="width:auto;padding:.6rem 1.5rem;border-radius:50px">Xóa bộ lọc</button></div>`;
  renderPagination(products.length, page);
}

function renderPagination(total, page) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= Math.min(pages, 8); i++) {
    html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (pages > 8) html += `<span style="align-self:center;color:var(--gray-400)">...</span>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; renderPage(filtered(), p); window.scrollTo({top:0,behavior:'smooth'}); }

function filtered() {
  const type    = document.querySelector('input[name=type]:checked')?.value || '';
  const q       = document.getElementById('search-box').value.toLowerCase();
  const minP    = parseFloat(document.getElementById('min-price').value) || 0;
  const maxP    = parseFloat(document.getElementById('max-price').value) || Infinity;
  const hiRat   = document.getElementById('rating-filter').checked;
  const sort    = document.getElementById('sort-select').value;

  let list = allProducts.filter(p => {
    if (type && p.product_type !== type) return false;
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (minP && p.price < minP) return false;
    if (maxP < Infinity && p.price > maxP) return false;
    if (hiRat && (p.rating || 0) < 4) return false;
    return true;
  });

  list.sort((a, b) => {
    if (sort === 'price')        return a.price - b.price;
    if (sort === '-price')       return b.price - a.price;
    if (sort === '-rating')      return (b.rating||0) - (a.rating||0);
    if (sort === '-sold_count')  return (b.sold_count||0) - (a.sold_count||0);
    return new Date(b.created_at) - new Date(a.created_at);
  });

  document.getElementById('results-count').textContent = `${list.length} sản phẩm`;
  return list;
}

function applyFilters() { currentPage = 1; renderPage(filtered(), 1); }

function clearFilters() {
  document.querySelectorAll('input[name=type]')[0].checked = true;
  document.getElementById('search-box').value = '';
  document.getElementById('min-price').value  = '';
  document.getElementById('max-price').value  = '';
  document.getElementById('rating-filter').checked = false;
  document.getElementById('sort-select').value = '-created_at';
  applyFilters();
}

function addCart(p) { Cart.add(p); Toast.show(`Đã thêm <strong>${p.name}</strong> vào giỏ!`); }

async function loadProducts() {
  try {
    const data = await API.getProducts({ page_size: 100 });
    allProducts = data.results || data || [];
    if (!allProducts.length) {
      // Fallback: show mock data
      allProducts = mockProducts();
    }
    applyFilters();
  } catch {
    allProducts = mockProducts();
    applyFilters();
  }
}

function mockProducts() {
  return MOCK_PRODUCTS.concat(MOCK_PRODUCTS.map(p => ({
    ...p, id: p.id + 100, name: p.name + ' (Pro)',
    price: Math.round(p.price * 1.2),
    original_price: Math.round(p.price * 1.5),
    discount_percent: 20,
  })));
}

// Search box
document.getElementById('search-box').addEventListener('input', applyFilters);

loadProducts();
</script>
<script src="js/chatbot.js?v=4"></script>
</body>
</html>
