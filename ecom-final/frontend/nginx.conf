server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # ─── Proxy API về gateway (dùng service name "gateway", không phải container_name) ──
    location /auth/      { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; proxy_read_timeout 30s; }
    location /users/     { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }
    location /products/  { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }
    location /categories/{ set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }
    location /events/    { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }
    location /cart/      { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }
    location /orders/    { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }
    location /payment/   { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }
    location /shipping/  { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }
    location /recommend  { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; proxy_read_timeout 60s; }
    location /chatbot    { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; proxy_read_timeout 60s; }
    location /health     { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }
    location /gateway/   { set $gw http://gateway:80; proxy_pass $gw; proxy_set_header Host $host; }

    # ─── Static files (tắt cache để browser luôn nhận file mới) ─────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
}
